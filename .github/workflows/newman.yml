name: Contract and Newman Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint OpenAPI contracts
        run: npx @stoplight/spectral-cli lint contracts/*.yaml > reports/contract-lint-report.txt || true

      - name: Start Prism mock server
        run: nohup npm run mock:core > prism.log 2>&1 &

      - name: Wait for mock server
        run: npx wait-on http://localhost:4012/health --timeout 30000

      - name: Run Newman on mock environment
        run: npm run test:mock

      - name: Show Prism log on failure
        if: failure()
        run: cat prism.log || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/
